<svg width="240" height="180" viewBox="0 0 240 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid lines -->
  <line x1="30" y1="30" x2="30" y2="150" stroke="white" strokeWidth="1" opacity="0.1"/>
  <line x1="30" y1="150" x2="220" y2="150" stroke="white" strokeWidth="1" opacity="0.1"/>
  <line x1="30" y1="105" x2="220" y2="105" stroke="white" strokeWidth="0.5" opacity="0.07"/>
  <line x1="30" y1="67" x2="220" y2="67" stroke="white" strokeWidth="0.5" opacity="0.07"/>

  <!-- Interest area (red zone, top) -->
  <path d="M30 55 Q60 53 90 60 Q120 67 150 80 Q180 95 210 110 L210 150 L30 150 Z" fill="#F59E0B" opacity="0.08"/>

  <!-- Principal remaining (filled area) -->
  <path d="M30 55 Q60 53 90 60 Q120 67 150 80 Q180 95 210 110 L220 150 L30 150 Z" fill="none"/>

  <!-- Total repayment curve (flat) -->
  <path d="M30 55 L220 55" stroke="white" strokeWidth="1.5" opacity="0.2" strokeDasharray="4 3"/>

  <!-- Principal remaining curve -->
  <path d="M30 55 Q60 53 90 60 Q120 67 150 80 Q180 95 210 115" stroke="#34D399" strokeWidth="2.5" fill="none" strokeLinecap="round"/>

  <!-- Monthly payment line (dotted) -->
  <path d="M30 120 Q70 108 110 100 Q150 92 190 85" stroke="#F59E0B" strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.8"/>

  <!-- Glow dots on curves -->
  <circle cx="30" cy="55" r="4" fill="white" opacity="0.5"/>
  <circle cx="210" cy="115" r="4" fill="#34D399" opacity="0.8"/>
  <circle cx="190" cy="85" r="4" fill="#F59E0B" opacity="0.8"/>

  <!-- Labels -->
  <rect x="35" y="37" width="50" height="14" rx="3" fill="white" opacity="0.1"/>
  <text x="60" y="48" textAnchor="middle" fill="white" fontSize="8" opacity="0.6" fontFamily="sans-serif">원금잔액</text>

  <rect x="155" y="70" width="56" height="14" rx="3" fill="#F59E0B" opacity="0.2"/>
  <text x="183" y="81" textAnchor="middle" fill="#F59E0B" fontSize="8" opacity="0.9" fontFamily="sans-serif">월 납입액</text>

  <!-- Y axis labels -->
  <text x="22" y="58" textAnchor="end" fill="white" fontSize="8" opacity="0.3" fontFamily="sans-serif">원금</text>
  <text x="22" y="153" textAnchor="end" fill="white" fontSize="8" opacity="0.3" fontFamily="sans-serif">0</text>

  <!-- X axis labels -->
  <text x="30" y="163" textAnchor="middle" fill="white" fontSize="8" opacity="0.3" fontFamily="sans-serif">1년</text>
  <text x="120" y="163" textAnchor="middle" fill="white" fontSize="8" opacity="0.3" fontFamily="sans-serif">15년</text>
  <text x="210" y="163" textAnchor="middle" fill="white" fontSize="8" opacity="0.3" fontFamily="sans-serif">30년</text>
</svg>
