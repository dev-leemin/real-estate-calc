<svg width="280" height="240" viewBox="0 0 280 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ground shadow -->
  <ellipse cx="140" cy="222" rx="100" ry="8" fill="#F59E0B" opacity="0.12"/>

  <!-- Main building body -->
  <rect x="60" y="90" width="160" height="130" rx="3" fill="#1E3A5F"/>

  <!-- Roof -->
  <polygon points="140,18 46,96 234,96" fill="#F59E0B"/>
  <polygon points="140,18 46,96 234,96" fill="url(#roofGrad)"/>

  <!-- Roof ridge -->
  <line x1="140" y1="18" x2="140" y2="96" stroke="#D97706" strokeWidth="2" opacity="0.5"/>

  <!-- Door -->
  <rect x="112" y="165" width="56" height="55" rx="3" fill="#F59E0B" opacity="0.9"/>
  <rect x="118" y="171" width="20" height="36" rx="2" fill="#D97706" opacity="0.6"/>
  <rect x="142" y="171" width="20" height="36" rx="2" fill="#D97706" opacity="0.6"/>
  <!-- Door knob -->
  <circle cx="137" cy="195" r="3" fill="#F59E0B"/>
  <circle cx="143" cy="195" r="3" fill="#F59E0B"/>

  <!-- Windows row 1 -->
  <rect x="74" y="105" width="36" height="28" rx="3" fill="#F8FAFC" opacity="0.15"/>
  <rect x="122" y="105" width="36" height="28" rx="3" fill="#F8FAFC" opacity="0.15"/>
  <rect x="170" y="105" width="36" height="28" rx="3" fill="#F59E0B" opacity="0.7"/>

  <!-- Windows row 2 -->
  <rect x="74" y="143" width="36" height="22" rx="3" fill="#F59E0B" opacity="0.5"/>
  <rect x="122" y="143" width="36" height="22" rx="3" fill="#F8FAFC" opacity="0.12"/>
  <rect x="170" y="143" width="36" height="22" rx="3" fill="#F8FAFC" opacity="0.12"/>

  <!-- Window dividers -->
  <line x1="92" y1="105" x2="92" y2="133" stroke="#F59E0B" strokeWidth="1" opacity="0.3"/>
  <line x1="74" y1="119" x2="110" y2="119" stroke="#F59E0B" strokeWidth="1" opacity="0.3"/>

  <!-- Chimney -->
  <rect x="165" y="42" width="18" height="40" rx="2" fill="#1E3A5F"/>
  <rect x="162" y="38" width="24" height="8" rx="2" fill="#2A4A6F"/>

  <!-- Price tag floating -->
  <g transform="translate(198, 45)">
    <rect x="0" y="0" width="70" height="32" rx="8" fill="#F59E0B"/>
    <text x="35" y="21" textAnchor="middle" fill="#1E3A5F" fontSize="13" fontWeight="800" fontFamily="sans-serif">6억 이하 1%</text>
  </g>
  <line x1="198" y1="61" x2="185" y2="80" stroke="#F59E0B" strokeWidth="1.5" opacity="0.6"/>

  <!-- Grass/ground -->
  <rect x="40" y="218" width="200" height="6" rx="3" fill="#D97706" opacity="0.2"/>

  <defs>
    <linearGradient id="roofGrad" x1="140" y1="18" x2="140" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#FBBF24"/>
      <stop offset="100%" stopColor="#D97706" stopOpacity="0.8"/>
    </linearGradient>
  </defs>
</svg>
