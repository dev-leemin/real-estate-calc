<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gift box base -->
  <rect x="40" y="105" width="120" height="80" rx="4" fill="#F43F5E" opacity="0.15"/>
  <rect x="40" y="105" width="120" height="80" rx="4" stroke="#F43F5E" strokeWidth="1.5" opacity="0.3"/>

  <!-- Gift box lid -->
  <rect x="32" y="88" width="136" height="22" rx="4" fill="#F43F5E" opacity="0.25"/>
  <rect x="32" y="88" width="136" height="22" rx="4" stroke="#F43F5E" strokeWidth="1.5" opacity="0.4"/>

  <!-- Vertical ribbon on box -->
  <rect x="92" y="105" width="16" height="80" fill="#F43F5E" opacity="0.25"/>

  <!-- Vertical ribbon on lid -->
  <rect x="92" y="88" width="16" height="22" fill="#F43F5E" opacity="0.4"/>

  <!-- Bow -->
  <!-- Left loop -->
  <path d="M100 88 Q68 65 72 45 Q76 28 92 38 Q104 50 100 88" fill="#F43F5E" opacity="0.4"/>
  <!-- Right loop -->
  <path d="M100 88 Q132 65 128 45 Q124 28 108 38 Q96 50 100 88" fill="#F43F5E" opacity="0.4"/>
  <!-- Center knot -->
  <circle cx="100" cy="88" r="8" fill="#F43F5E" opacity="0.6"/>

  <!-- Tax-exempt badge -->
  <g transform="translate(118, 120)">
    <rect x="0" y="0" width="56" height="26" rx="7" fill="#F43F5E" opacity="0.9"/>
    <text x="28" y="11" textAnchor="middle" fill="white" fontSize="8" fontFamily="sans-serif" opacity="0.9">배우자</text>
    <text x="28" y="22" textAnchor="middle" fill="white" fontSize="9" fontWeight="700" fontFamily="sans-serif">6억 공제</text>
  </g>

  <!-- Arrow from badge -->
  <path d="M118 133 L105 145" stroke="#F43F5E" strokeWidth="1.5" opacity="0.4" strokeLinecap="round"/>

  <!-- Person icons representing donor → recipient -->
  <circle cx="20" cy="160" r="12" fill="#F43F5E" opacity="0.2"/>
  <text x="20" y="165" textAnchor="middle" fontSize="14" fontFamily="sans-serif">👤</text>
  <path d="M36 160 L56 160" stroke="#F43F5E" strokeWidth="2" strokeDasharray="3 2" opacity="0.4"/>
  <polygon points="56,156 64,160 56,164" fill="#F43F5E" opacity="0.4"/>
  <circle cx="72" cy="160" r="12" fill="#F43F5E" opacity="0.15"/>
  <text x="72" y="165" textAnchor="middle" fontSize="14" fontFamily="sans-serif">👤</text>
</svg>
